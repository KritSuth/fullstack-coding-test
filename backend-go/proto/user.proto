syntax = "proto3";

package user;

option go_package = "github.com/KritSuth/fullstack-coding-test/backend-go/proto/user";

// ─── Messages ─────────────────────────────────────────────────────────────────

message CreateUserRequest {
  string name     = 1;
  string email    = 2;
  string password = 3;
}

message GetUserRequest {
  string id = 1;
}

message UserResponse {
  string id         = 1;
  string name       = 2;
  string email      = 3;
  string created_at = 4;
}

// ─── Service ──────────────────────────────────────────────────────────────────

service UserService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc GetUser    (GetUserRequest)    returns (UserResponse);
}
